# =============================================================================
# Baseline Model Training Configuration
# =============================================================================

data:
  path: "data/processed/features.parquet"
  label_column: "label"
  group_column: "repo_id"
  test_size: 0.15

models:
  logistic_regression:
    class_weight: "balanced"
    max_iter: 1000
    C: 1.0
    random_state: 42

  random_forest:
    n_estimators: 200
    max_depth: 15
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 300
    max_depth: 8
    learning_rate: 0.1
    eval_metric: "aucpr"
    random_state: 42
    n_jobs: -1

evaluation:
  n_folds: 5
  primary_metric: "auc_roc"
  metrics:
    - auc_roc
    - auc_pr
    - f1_score
    - mcc
    - precision
    - recall

mlflow:
  experiment_name: "pr-risk-baseline"
  tracking_uri: "http://localhost:5000"

output:
  model_dir: "models/baseline"
